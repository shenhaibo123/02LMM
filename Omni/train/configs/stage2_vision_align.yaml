# Stage 2: 视觉-语言对齐
# 目标: 训练 Visual Projector (MLP)，将 SigLIP 视觉特征映射到 LLM 嵌入空间
# 冻结: LLM + SigLIP encoder + Audio encoder + Audio projector + Speech decoder
# 训练: Visual Projector (~4M params)

stage: 2
stage_name: "视觉-语言对齐"

# ── 模型 ─────────────────────────────────────────────────
model:
  llm: "Qwen/Qwen3-8B"
  vision_encoder: "google/siglip-so400m-patch14-384"
  audio_encoder: "openai/whisper-large-v3"
  trust_remote_code: true
  torch_dtype: "bfloat16"
  # 加载 Stage 1 checkpoint（如有）
  resume_from: "outputs/stage1_audio_align/latest"

# ── 冻结策略 ─────────────────────────────────────────────
freeze:
  vision_encoder: true
  audio_encoder: true
  llm: true
  visual_projector: false   # 仅此组件可训练
  audio_projector: true
  speech_decoder: true

# ── 数据 ─────────────────────────────────────────────────
data:
  train_files:
    - "datasets/stage2/swift_format/liuhaotian_LLaVA-CC3M-Pretrain-595K_swift.jsonl"
  data_type: "image_text"
  max_seq_len: 2048

# ── 训练超参 ─────────────────────────────────────────────
training:
  learning_rate: 1.0e-3
  lr_scheduler: "cosine"
  warmup_steps: 500
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_epochs: 1
  batch_size_per_gpu: 32
  gradient_accumulation_steps: 4

# ── 优化器 ─────────────────────────────────────────────
optimizer:
  type: "adamw"
  betas: [0.9, 0.999]
  eps: 1.0e-8

# ── DeepSpeed ─────────────────────────────────────────────
deepspeed: "configs/deepspeed_zero2.json"

# ── 保存与日志 ───────────────────────────────────────────
output_dir: "outputs/stage2_vision_align"
save_strategy: "steps"
save_steps: 500
save_total_limit: 3
logging_steps: 10
report_to: "tensorboard"

# ── 硬件 ─────────────────────────────────────────────────
hardware:
  gpus: 8
  gpu_type: "A100-80G"
  estimated_time: "1 day"
