# Stage 4 Smoke Test: 语音生成训练（轻量验证）

stage: 4
stage_name: "语音生成训练 (Smoke)"

model:
  llm: "Qwen/Qwen3-0.5B"
  vision_encoder: "openai/clip-vit-base-patch32"
  audio_encoder: "openai/whisper-small"
  trust_remote_code: true
  torch_dtype: "bfloat16"
  resume_from: "outputs/smoke/stage3_multimodal_sft/latest"

freeze:
  vision_encoder: true
  audio_encoder: true
  visual_projector: true
  audio_projector: false
  llm: true
  speech_decoder: false

loss:
  type: "ctc_lm"
  ctc_weight: 0.5
  lm_weight: 0.5
  ctc_blank_id: 4096

data:
  train_files:
    - "datasets/stage4/swift_format/cdminix_libritts-r-aligned_swift.jsonl"
  data_type: "tts"
  max_seq_len: 512
  max_samples: 500

training:
  learning_rate: 5.0e-4
  lr_scheduler: "cosine"
  warmup_steps: 50
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_epochs: 1
  batch_size_per_gpu: 8
  gradient_accumulation_steps: 1

output_dir: "outputs/smoke/stage4_speech_gen"
save_strategy: "epoch"
save_total_limit: 1
logging_steps: 5
report_to: "tensorboard"

hardware:
  gpus: 1
  estimated_time: "30 min"
