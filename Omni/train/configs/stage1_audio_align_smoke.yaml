# Stage 1 Smoke Test: 音频-语言对齐（轻量验证）
# 使用小模型，少量数据，单卡运行，目标 < 30 分钟

stage: 1
stage_name: "音频-语言对齐 (Smoke)"

model:
  llm: "Qwen/Qwen3-0.5B"
  vision_encoder: "openai/clip-vit-base-patch32"
  audio_encoder: "openai/whisper-small"
  trust_remote_code: true
  torch_dtype: "bfloat16"

freeze:
  vision_encoder: true
  audio_encoder: true
  llm: true
  visual_projector: true
  audio_projector: false
  speech_decoder: true

data:
  train_files:
    - "datasets/stage1/swift_format/openslr_librispeech_asr_swift.jsonl"
  data_type: "audio_text"
  max_seq_len: 512
  max_samples: 500

training:
  learning_rate: 1.0e-3
  lr_scheduler: "cosine"
  warmup_steps: 50
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_epochs: 1
  batch_size_per_gpu: 8
  gradient_accumulation_steps: 1

output_dir: "outputs/smoke/stage1_audio_align"
save_strategy: "epoch"
save_total_limit: 1
logging_steps: 5
report_to: "tensorboard"

hardware:
  gpus: 1
  estimated_time: "30 min"
