# Stage 5 Smoke Test: DPO 偏好对齐（轻量验证）

stage: 5
stage_name: "DPO 偏好对齐 (Smoke)"

model:
  llm: "Qwen/Qwen3-0.5B"
  vision_encoder: "openai/clip-vit-base-patch32"
  audio_encoder: "openai/whisper-small"
  trust_remote_code: true
  torch_dtype: "bfloat16"
  resume_from: "outputs/smoke/stage4_speech_gen/latest"

lora:
  enabled: true
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

freeze:
  vision_encoder: true
  audio_encoder: true
  visual_projector: false
  audio_projector: false
  llm: false
  speech_decoder: false

loss:
  type: "dpo"
  beta: 0.1
  label_smoothing: 0.0

data:
  train_files:
    - "datasets/stage5/swift_format/openbmb_UltraFeedback_swift.jsonl"
  data_type: "preference"
  max_seq_len: 512
  max_samples: 200

training:
  learning_rate: 5.0e-6
  lr_scheduler: "cosine"
  warmup_steps: 20
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_epochs: 1
  batch_size_per_gpu: 2
  gradient_accumulation_steps: 2

output_dir: "outputs/smoke/stage5_dpo"
save_strategy: "epoch"
save_total_limit: 1
logging_steps: 5
report_to: "tensorboard"

hardware:
  gpus: 1
  estimated_time: "20 min"
