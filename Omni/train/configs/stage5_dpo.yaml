# Stage 5: DPO 偏好对齐
# 目标: 使用 DPO 提升模型输出质量与安全性
# 冻结: Vision encoder + Audio encoder
# 训练: LLM (LoRA r=16) + Speech Decoder

stage: 5
stage_name: "DPO 偏好对齐"

# ── 模型 ─────────────────────────────────────────────────
model:
  llm: "Qwen/Qwen3-8B"
  vision_encoder: "google/siglip-so400m-patch14-384"
  audio_encoder: "openai/whisper-large-v3"
  trust_remote_code: true
  torch_dtype: "bfloat16"
  resume_from: "outputs/stage4_speech_gen/latest"

# ── LoRA 配置 ────────────────────────────────────────────
lora:
  enabled: true
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

# ── 冻结策略 ─────────────────────────────────────────────
freeze:
  vision_encoder: true
  audio_encoder: true
  visual_projector: false
  audio_projector: false
  llm: false              # LoRA 微调
  speech_decoder: false

# ── 数据 ─────────────────────────────────────────────────
data:
  train_files:
    - "datasets/stage5/swift_format/openbmb_UltraFeedback_swift.jsonl"
  data_type: "preference"
  max_seq_len: 2048

# ── 损失函数 ─────────────────────────────────────────────
loss:
  type: "dpo"
  beta: 0.1               # DPO 温度参数
  label_smoothing: 0.0

# ── 训练超参 ─────────────────────────────────────────────
training:
  learning_rate: 5.0e-6
  lr_scheduler: "cosine"
  warmup_steps: 200
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_epochs: 1
  batch_size_per_gpu: 4
  gradient_accumulation_steps: 16

# ── 优化器 ─────────────────────────────────────────────
optimizer:
  type: "adamw"
  betas: [0.9, 0.999]
  eps: 1.0e-8

# ── DeepSpeed ─────────────────────────────────────────────
deepspeed: "configs/deepspeed_zero2.json"

# ── 保存与日志 ───────────────────────────────────────────
output_dir: "outputs/stage5_dpo"
save_strategy: "steps"
save_steps: 200
save_total_limit: 3
logging_steps: 5
report_to: "tensorboard"

# ── 硬件 ─────────────────────────────────────────────────
hardware:
  gpus: 8
  gpu_type: "A100-80G"
  estimated_time: "1 day"
